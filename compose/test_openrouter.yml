services:
  worker-dev:
    image: prefecthq/prefect:3-latest
    container_name: ai-news-worker-dev
    working_dir: /app

    env_file:
      - ../../private/env/prefect.dev.env

    networks:
      - prefect-net

    volumes:
      - ../src:/app/src:ro
      - ../requirements.txt:/app/requirements.txt:ro

    # Install deps once at container start, then stay alive.
    command:
      - /bin/sh
      - -lc
      - |
        python -m pip install --no-cache-dir -U pip &&
        pip install --no-cache-dir -r /app/requirements.txt &&
        tail -f /dev/null

    healthcheck:
      test: ["CMD", "python", "-c", "import openai"]
      interval: 10s
      timeout: 3s
      retries: 12
      start_period: 20s

    restart: "no"

networks:
  prefect-net:
    external: true