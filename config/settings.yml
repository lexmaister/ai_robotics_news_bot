# =============================================================================
# AI & Robotics News Curation Bot — Settings
# =============================================================================
# Secrets (API keys, tokens) live in .env, not here.
# See README for architecture overview and strategy rationale.
#
# --- NEWSDATA.IO FREE PLAN CONSTRAINTS ---
# • 200 credits/day  (1 credit = 1 API request)
# • Rate limit: max 30 requests per 15-minute window
# • Max 10 results per request (size=10)
# • Timeframe limited to last 48 hours
#
# --- SESSION MATH ---
# 200 credits ÷ 7 sessions/day ≈ 28.6 credits/session → we use 30 per session.
# 5 domains × 6 queries = 30 requests = 30 credits, filling the rate-limit window.
# Last session of the day may receive fewer remaining credits — acceptable.
# =============================================================================

# --------------------------------------------------------------------------- #
# Orchestration (Prefect scheduler)
# --------------------------------------------------------------------------- #
orchestration:
  runs_per_day: 7                       # ~3h 26min between runs (24h ÷ 7)
  report_interval_days: 7               # weekly report + cleanup cadence (days)

# --------------------------------------------------------------------------- #
# Session — one gathering run
# --------------------------------------------------------------------------- #
session:
  credits: 30                           # newsdata.io requests per session (= rate-limit ceiling)
  domains_per_session: 5                # domains randomly sampled from whitelist each run

# --------------------------------------------------------------------------- #
# NewsData.io API parameters
# --------------------------------------------------------------------------- #
newsdata:
  language: "en"
  size: 10                              # results per request (max allowed by newsdata.io)
  removeduplicate: true                 # API-level dedup within a single response
  excludefield:                         # drop heavy/unused fields to reduce payload
    - image_url
    - video_url
    - source_icon
    - source_id
    - source_name
    - category
    - country
    - language
    - keywords
    - creator
  query_field_mode: "random"            # randomly pick "q" (full-text) or "qInTitle" per request; balances recall vs precision

# --------------------------------------------------------------------------- #
# Queries — 6 broad topics (max 100 chars each per newsdata.io constraint)
# Intentionally broad: the domain whitelist already filters for quality sources.
# --------------------------------------------------------------------------- #
queries:
  - name: "robotics"
    q: "robot OR robotics OR humanoid OR bipedal OR quadruped OR cobot OR swarm"
    # Length: 74 chars

  - name: "autonomous_systems"
    q: "autonomous OR self-driving OR drone OR UAV OR UGV OR lidar OR sensor fusion"
    # Length: 77 chars

  - name: "ai_models_agents"
    q: "artificial intelligence OR LLM OR GPT OR transformer OR AI agent OR neural network"
    # Length: 84 chars

  - name: "generative_ai_research"
    q: "generative AI OR diffusion model OR multimodal OR AI research OR fine-tuning OR RLHF"
    # Length: 86 chars

  - name: "ai_industry_hardware"
    q: "AI chip OR GPU OR TPU OR neuromorphic OR edge AI OR AI startup OR enterprise AI"
    # Length: 81 chars

  - name: "ai_policy_science"
    q: "AI regulation OR AI safety OR AI ethics OR AI governance OR AI risk OR alignment"
    # Length: 82 chars

# --------------------------------------------------------------------------- #
# Design Notes
# --------------------------------------------------------------------------- #
# • Rotation state persisted in last_news.json (domain_group field).
# • Deduplication at DB level via unique constraint on article link/hash.
# • Theoretical max: 30 × 10 = 300 articles/session; real yield is lower.

# --------------------------------------------------------------------------- #
# Report — weekly trends report knobs
# (non-time-window knobs only; lookback window = orchestration.report_interval_days)
# --------------------------------------------------------------------------- #
report:
  max_articles_to_analyze: 300     # max published articles fetched for clustering
  max_clusters: 8                  # KMeans k; actual count may be less after min_cluster_size filter
  min_cluster_size: 3              # clusters smaller than this are excluded from the report
  max_titles_per_cluster: 5        # representative titles shown per cluster in the LLM prompt
  max_message_chars: 3500          # max Telegram message length (HTML, safety trim)
  include_sources_summary: true    # append top-5 source domains block at end of LLM prompt
  include_vector_insights: true    # inject clustering signal metrics (breadth, dominance, cohesion) into prompt

# --------------------------------------------------------------------------- #
# LLM Models (OpenRouter) — swap any model without code changes
# --------------------------------------------------------------------------- #
llm:
  openrouter_base_url: "https://openrouter.ai/api/v1"
  categorization_model: "meta-llama/llama-3.1-8b-instruct"   # Task 4: batch title labeling
  curation_model: "google/gemma-4-31b-it"                    # Task 5: article selection
  embedding_model: "qwen/qwen3-embedding-8b"                 # Task 7: title vectorization
  analysis_model: "deepseek/deepseek-v4-flash"               # Report Task 4: narrative
  timeout: 120                       # OpenRouter HTTP timeout in seconds (all LLM tasks)

  # Task 4 — loops batches until backlog empty or max_total_rounds.
  # poison_mode "fail" halts on unresolvable title; "mark" labels it and continues.
  # poison_fallback_category must be a valid DB category value.
  categorization:
    batch_size: 10                   # titles sent to LLM per round
    max_total_rounds: 50             # hard loop cap per flow run
    min_chunk_size: 1                # smallest chunk during split-retry
    poison_mode: "mark"              # "fail" | "mark"
    poison_fallback_category: "Unrecognized"

  # Task 5 — selects best articles via tool-calling; uses recent posts as diversity context.
  curation:
    batch_size: 20                   # max candidate articles fetched per run
    max_selected: 3                  # max articles posted per session
    rag_context_size: 20             # recently published articles as diversity context
    temperature: 0.0                 # deterministic selection

  # Task 7 — dimensions must match VECTOR(N) in db/schema.sql.
  embedding:
    dimensions: 1536                 # must match VECTOR(1536) in db/schema.sql
    batch_size: 50                   # published articles to embed per run

  # Report Task 4 — weekly narrative generation.
  analysis:
    temperature: 0.3                 # slight creativity for readable prose
    timeout: 120                     # seconds; overrides global timeout
    max_output_chars: 3000           # hard cap applied in Python before posting

