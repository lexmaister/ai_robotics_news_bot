# =============================================================================
# AI & Robotics News Curation Bot — Settings
# =============================================================================
# Secrets (API keys, tokens) live in .env, not here.
#
# --- FREE PLAN CONSTRAINTS (newsdata.io) ---
# • 200 credits/day (1 credit = 1 API request)
# • Rate limit: max 30 requests per 15-minute window
# • Max 10 results per request (size=10)
# • Timeframe limited to last 48 hours
#
# --- BUDGET MATH ---
# 200 credits ÷ 7 sessions/day ≈ 28.6 credits/session → we use 30 per session.
# Last session of the day gets only the remaining credits (~20), which is fine
# since the DB already captured most articles by then.
#
# --- SESSION STRUCTURE ---
# Each session: 5 domains × 6 queries = 30 requests (= 30 credits).
# 5 domains are randomly sampled from the full 25-source whitelist each run.
# This provides source diversity across the day while staying within rate limits.
# Deduplication of articles is handled at DB level (pgvector upsert on link hash).
# =============================================================================

# --------------------------------------------------------------------------- #
# Orchestration (Prefect scheduler)
# --------------------------------------------------------------------------- #
orchestration:
  runs_per_day: 7                       # 24h ÷ 7 = ~3h 26min between runs
  # Chosen so that 7 × 30 = 210 ≈ 200 daily credits (slight overshoot is OK;
  # the last session simply gets fewer credits remaining).

# --------------------------------------------------------------------------- #
# Session — one gathering run
# --------------------------------------------------------------------------- #
session:
  credits: 30                           # requests per session; equals rate-limit ceiling (30/15min)
  domains_per_session: 5                # randomly sample 5 domains from 25 each run
  # 5 domains × 6 queries = 30 requests → exactly fills the rate-limit window.

# --------------------------------------------------------------------------- #
# NewsData.io API parameters
# --------------------------------------------------------------------------- #
newsdata:
  language: "en"
  size: 10                              # results per request (free plan maximum)
  removeduplicate: true                 # API-level dedup within a single response
  excludefield:                         # drop heavy/unused fields to reduce payload
    - image_url
    - video_url
    - source_icon
    - source_id
    - source_name
    - category
    - country
    - language
    - keywords
    - creator
  query_field_mode: "random"            # randomly pick "q" (full-text) or "qInTitle" per request
  # "q" casts a wide net; "qInTitle" is more precise. Alternating
  # gives a mix of recall and precision without doubling credit spend.

# --------------------------------------------------------------------------- #
# Queries — 6 broad topics (max 100 chars each per API constraint)
# --------------------------------------------------------------------------- #
# Strategy: queries are intentionally broad and inclusive because the domain
# whitelist already constrains results to high-quality sources. Broad queries
# ensure we don't miss relevant articles that use unexpected terminology.
# All 6 queries run against every sampled domain each session.
# --------------------------------------------------------------------------- #
queries:
  - name: "robotics"
    q: "robot OR robotics OR humanoid OR bipedal OR quadruped OR cobot OR swarm"
    # Length: 74 chars

  - name: "autonomous_systems"
    q: "autonomous OR self-driving OR drone OR UAV OR UGV OR lidar OR sensor fusion"
    # Length: 77 chars

  - name: "ai_models_agents"
    q: "artificial intelligence OR LLM OR GPT OR transformer OR AI agent OR neural network"
    # Length: 84 chars

  - name: "generative_ai_research"
    q: "generative AI OR diffusion model OR multimodal OR AI research OR fine-tuning OR RLHF"
    # Length: 86 chars

  - name: "ai_industry_hardware"
    q: "AI chip OR GPU OR TPU OR neuromorphic OR edge AI OR AI startup OR enterprise AI"
    # Length: 81 chars

  - name: "ai_policy_science"
    q: "AI regulation OR AI safety OR AI ethics OR AI governance OR AI risk OR alignment"
    # Length: 82 chars

# --------------------------------------------------------------------------- #
# Design Notes
# --------------------------------------------------------------------------- #
# • No rotation state needed — random sampling from full whitelist each session.
# • Deduplication handled at DB level (pgvector upsert on article link/hash).
# • Theoretical max yield: 30 requests × 10 articles = 300 articles/session,
#   but real yield is lower due to overlap, dedup, and source availability.
# • If upgrading to a paid plan, increase: credits, domains_per_session, size.

# --------------------------------------------------------------------------- #
# LLM Models (OpenRouter)
# --------------------------------------------------------------------------- #
llm:
  # Cheap/free model used for high-volume, low-stakes tasks (title categorization)
  categorization_model: "nvidia/nemotron-nano-9b-v2:free"
  # Higher-quality model used for final selection + summarization (curation)
  curation_model: "nvidia/nemotron-3-ultra-550b-a55b:free"
  # OpenRouter API base URL (OpenAI-compatible endpoint)
  openrouter_base_url: "https://openrouter.ai/api/v1"
  # OpenRouter API call timeout in seconds (shared by all LLM tasks)
  timeout: 120
  # ------------------------------------------------------------------------- #
  # Task 4: Categorize backlog (uncategorized titles) — operational knobs
  #
  # The backlog size is unknown. Task4 loops until no uncategorized titles remain,
  # but needs safety valves and failure behavior controls to avoid infinite loops
  # and to handle "poison pill" titles that repeatedly cause invalid LLM output.
  #
  # How it works:
  # - Fetch up to batch_size titles from DB.
  # - Call LLM to return a JSON array of N categories (N == number of titles).
  # - If validation fails, Task4 splits the chunk into smaller chunks until it
  #   isolates the problematic title(s).
  #
  # poison_mode:
  # - "fail": raise and fail the flow if a single title cannot be categorized.
  # - "mark": set that title's category to poison_fallback_category and continue.
  #
  # NOTE: poison_fallback_category must be a valid DB value. If you want a marker
  # that is "invalid" for downstream logic, treat it as a reserved category in code.
  # ------------------------------------------------------------------------- #
  categorization:
    batch_size: 10                   # number of uncategorized article titles to send to the LLM per iteration
    max_total_rounds: 50             # hard cap on total LLM attempts per flow run
    min_chunk_size: 1                # smallest chunk size during split retries
    poison_mode: "mark"              # "fail" | "mark"
    poison_fallback_category: "Unrecognized"

  # --------------------------------------------------------------------------- #
  # Task 5: Curate for publication — operational knobs
  #
  # How it works:
  # - Fetch up to batch_size categorized, unpublicated articles from DB.
  # - Fetch rag_context_size recently published articles as diversity context.
  # - Ask LLM to return a JSON array of up to max_selected article IDs.
  # - Validate all returned IDs were in the candidate list sent to the model.
  # - Write selected articles (id, title, category) to /app/data/to_publish.json.
  # --------------------------------------------------------------------------- #
  curation:
    batch_size: 20                   # max categorized+unpublicated articles to fetch per run
    max_selected: 3                  # max articles to select for publication per session
    rag_context_size: 20             # recently published articles for diversity context
    temperature: 0.0                 # deterministic selection

