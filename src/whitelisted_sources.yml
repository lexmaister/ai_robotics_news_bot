# Whitelisted News Sources for AI & Robotics News Curation Bot
# Format: domain | description
# Total: 30 sources

sources:

  # === Tier 1: Dedicated AI/Robotics ===

  - domain: therobotreport.com
    description: Dedicated robotics industry news, research, analysis and investment tracking

  - domain: venturebeat.com
    description: Deep AI/ML enterprise coverage, startup ecosystem and emerging tech

  - domain: thenextweb.com
    description: New technologies and startups, creative tech media with global events coverage

  - domain: interestingengineering.com
    description: Engineering and robotics stories, science and innovation reporting

  # === Tier 2: Major Tech Publications ===

  - domain: techcrunch.com
    description: Technology startups, investments, software and high-tech gadgets news

  - domain: arstechnica.com
    description: In-depth technical journalism covering hardware, software, science and technology policy

  - domain: theverge.com
    description: Intersection of technology, science, art and culture with in-depth reporting

  - domain: cnet.com
    description: Technology news, gadgets, AI, software, innovation and product reviews

  - domain: engadget.com
    description: Tech reviews, gadgets, electronics and consumer technology updates

  - domain: wired.com
    description: Long-form technology and science analysis, ideas for a world in transformation

  - domain: tomshardware.com
    description: Hardware and AI industry reporting, technical reviews and benchmarks

  - domain: techradar.com
    description: Technology news, reviews and insights on gadgets, innovations and new launches

  - domain: forbes.com
    description: Business, technology and finance with influential rankings and in-depth reporting

  - domain: digitaltrends.com
    description: Consumer electronics, AI and emerging tech, gaming and smart home coverage

  - domain: vox.com
    description: In-depth analysis of science, technology, politics and culture with context

  # === Tier 3: Science/Research ===

  - domain: sciencedaily.com
    description: Research-focused news from academic institutions, robotics and AI research

  - domain: livescience.com
    description: Science and research angle on AI, technology breakthroughs and discoveries

  - domain: newscientist.com
    description: Science-focused reporting on robotics, AI research and emerging technologies

  # === Tier 4: Industry/Business/General ===

  - domain: reuters.com
    description: Major AI deals, regulation, industry moves and global tech policy

  - domain: benzinga.com
    description: AI business and market analysis, fintech and investment news

  - domain: zdnet.com
    description: Practical enterprise AI coverage, B2B technology and digital transformation

  - domain: hackernoon.com
    description: Community-driven AI/ML practitioner content, developer stories and tutorials

  - domain: techbullion.com
    description: AI, fintech and startup news, technology industry coverage

  - domain: analyticsinsight.net
    description: AI, machine learning and big data enterprise analysis and trends

  - domain: theguardian.com
    description: Major AI releases coverage, technology policy, regulation and society impact

  # === Tier 5: Business/Finance with AI Focus ===

  - domain: cnbc.com
    description: Real-time AI business news, market coverage and financial analysis

  - domain: bloomberg.com
    description: Breaking AI industry news, funding rounds, regulation and market developments

  - domain: ft.com
    description: AI enterprise and policy analysis, financial journalism and economic impact

  - domain: economist.com
    description: In-depth AI impact analysis, global business and technology commentary

  - domain: inc.com
    description: AI startups, entrepreneurship insights and growing company coverage
